<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RSR Scanner</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1b2a41, #0f172a);
    color: white;
    text-align: center;
}

/* HEADER */
header {
    padding: 18px;
    font-size: 28px;
    font-weight: bold;
}

/* MODE BOX */
.mode-box {
    margin: 10px auto;
    width: 240px;
    padding: 15px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
}

.mode-icon {
    font-size: 50px;
}

.mode-text {
    font-size: 14px;
    opacity: 0.85;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

.tab {
    padding: 10px 18px;
    margin: 5px;
    border-radius: 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    font-weight: bold;
    transition: 0.2s;
}

.tab.active {
    background: #00ffcc;
    color: black;
    transform: scale(1.05);
}

/* SCANNER */
#reader {
    margin: 15px auto;
    width: 340px;
    border-radius: 15px;
    overflow: hidden;
}

/* CARD */
.card {
    margin-top: 15px;
    background: rgba(255,255,255,0.07);
    padding: 15px;
    border-radius: 15px;
    width: 340px;
    margin-left: auto;
    margin-right: auto;
}

/* BUTTONS */
button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* LINK */
a {
    color: #00ffcc;
    word-break: break-all;
}

/* 🔥 TOAST POPUP */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.9);
    padding: 12px 18px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<header>📱 RSR Scanner</header>

<div class="mode-box">
    <div class="mode-icon" id="modeIcon">📷</div>
    <div class="mode-text" id="modeText">QR CODE SCANNER</div>
</div>

<div class="tabs">
    <div class="tab active" id="qrTab" onclick="setMode('qr')">QR Code</div>
    <div class="tab" id="barcodeTab" onclick="setMode('barcode')">Barcode</div>
</div>

<div id="reader"></div>

<div class="card">
    <h3>Scan Result</h3>
    <div id="result">Waiting...</div>

    <button onclick="copyText()">📋 Copy</button>
    <button onclick="clearAll()">🗑 Clear</button>
</div>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scanner;
let mode = "qr";
let lastText = "";
let scanLocked = false;

/* START */
function startScanner() {
    scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 },
        false
    );

    scanner.render(onScanSuccess);
}

/* 🔥 MAIN SCAN LOGIC */
function onScanSuccess(decodedText) {

    if (scanLocked) return;

    let isBarcode = /^[0-9]{6,}$/.test(decodedText);

    // ❌ WRONG SCAN (QR MODE)
    if (mode === "qr" && isBarcode) {
        handleWrongScan("📊 Barcode not allowed in QR mode");
        return;
    }

    // ❌ WRONG SCAN (BARCODE MODE)
    if (mode === "barcode" && !isBarcode) {
        handleWrongScan("📷 QR Code not allowed in Barcode mode");
        return;
    }

    // ✅ VALID SCAN
    scanLocked = true;
    showResult(decodedText);

    setTimeout(() => {
        scanLocked = false;
    }, 3000);
}

/* 🔥 WRONG SCAN FIX (FULL RESET) */
function handleWrongScan(msg) {

    scanLocked = true;

    showToast(msg);

    if (scanner) {
        scanner.clear().then(() => {
            document.getElementById("reader").innerHTML = "";

            setTimeout(() => {
                startScanner();
                scanLocked = false;
            }, 1200);
        });
    }
}

/* SHOW RESULT */
function showResult(text) {
    lastText = text;

    document.getElementById("result").innerHTML =
        text.startsWith("http")
        ? `<a href="${text}" target="_blank">${text}</a>`
        : "📦 " + text;

    showToast("✅ Scan Successful");
}

/* TOAST */
function showToast(msg) {
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

/* MODE SWITCH */
function setMode(m) {
    mode = m;

    document.getElementById("qrTab").classList.remove("active");
    document.getElementById("barcodeTab").classList.remove("active");

    if (m === "qr") {
        document.getElementById("qrTab").classList.add("active");
        document.getElementById("modeIcon").innerText = "📷";
        document.getElementById("modeText").innerText = "QR CODE SCANNER";
    } else {
        document.getElementById("barcodeTab").classList.add("active");
        document.getElementById("modeIcon").innerText = "📊";
        document.getElementById("modeText").innerText = "BARCODE SCANNER";
    }

    resetScanner();
}

/* RESET SCANNER */
function resetScanner() {
    if (scanner) {
        scanner.clear().then(() => {
            document.getElementById("reader").innerHTML = "";
            startScanner();
        });
    }
}

/* COPY */
function copyText() {
    if (!lastText) return showToast("Nothing to copy!");
    navigator.clipboard.writeText(lastText);
    showToast("📋 Copied!");
}

/* CLEAR */
function clearAll() {
    lastText = "";
    document.getElementById("result").innerText = "Waiting...";
    resetScanner();
    showToast("🗑 Cleared");
}

/* INIT */
startScanner();
</script>

</body>
</html>
